[workspace]
name = "neutron-gamma-removal"
channels = ["conda-forge"]
platforms = ["win-64"]
version = "0.1.0"

[tasks]
py = "python -c \"import sys; print(sys.version)\""
run = "python scripts/run_one_scan.py"
lab = "jupyter lab"

fmt = "ruff format ."
lint = "ruff check ."

[dependencies]
python = ">=3.11,<3.13"
numpy = ">=1.26"
scipy = ">=1.11"
scikit-image = ">=0.22"
astropy = ">=6.0"          # FITS I/O
tqdm = ">=4.66"
matplotlib = ">=3.8"

# optional but very useful
pandas = ">=2.2"
jupyterlab = ">=4.1"
ipykernel = ">=6.29"

[pypi-dependencies]
# if you later want robust regression / models, we can add:
# statsmodels = "*"
